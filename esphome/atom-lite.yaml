esphome:
  name: atom-lite
  friendly_name: "Atom Lite BLE Bridge"
  # Uncomment to enable bluetooth_proxy (requires bluedroid_null_fix.py
  # in your ESPHome config directory — see bottom of this file):
  # platformio_options:
  #   extra_scripts:
  #     - pre:/config/esphome/bluedroid_null_fix.py

# ESP-IDF is required (not Arduino) because Bluedroid's notification limit
# is only configurable via sdkconfig.  Arduino uses precompiled libbt.a with
# BTA_GATTC_NOTIF_REG_MAX=5 — Sonicare needs 11 subscriptions.
esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_MAX_CACHE_CHAR: "80"    # default 40; Sonicare has ~45 attributes
      CONFIG_BT_GATTC_NOTIF_REG_MAX: "20"     # default 5; we subscribe to 11 chars

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  custom_services: true
  homeassistant_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Atom-Lite-Fallback"
    password: !secret fallback_password

captive_portal:

# --- BLE ---

esp32_ble:
  io_capability: none
  max_notifications: 20

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 211ms
    window: 120ms

# --- BLE Client ---
# Replace the MAC address with your Sonicare's Bluetooth address.
# You can find the MAC in the Philips app or via a BLE scanner.
#
# BLE bonding is handled automatically by the component.  Models that
# require bonding (ExpertClean, HX991M) are paired via SMP after service
# discovery; models with open GATT (DiamondClean) work as before.

ble_client:
  - mac_address: "XX:XX:XX:XX:XX:XX"          # <-- Replace with your Sonicare's MAC
    id: philips_sonicare_ble
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Connected to Sonicare"
        - light.turn_on:
            id: status_led
            red: 0%
            green: 100%
            blue: 0%
    on_disconnect:
      then:
        - logger.log: "Disconnected from Sonicare"
        - light.turn_on:
            id: status_led
            red: 100%
            green: 0%
            blue: 0%

# --- Philips Sonicare Component ---

external_components:
  - source:
      type: git
      url: https://github.com/mtheli/philips_sonicare_ble
      ref: master
      path: esphome/components
    components: [philips_sonicare]
    refresh: 0s

philips_sonicare:
  ble_client_id: philips_sonicare_ble

# --- Hardware: M5Stack Atom Lite ---

# NeoPixel LED (GPIO27) — esp32_rmt_led_strip required for ESP-IDF
light:
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    rgb_order: GRB
    pin: GPIO27
    num_leds: 1
    id: status_led
    name: "Status LED"
    restore_mode: ALWAYS_OFF

# Button (GPIO39)
binary_sensor:
  - platform: gpio
    id: atom_button
    name: "Button"
    pin:
      number: GPIO39
      inverted: true

# --- Bluetooth Proxy (optional) ---
# bluetooth_proxy requires a workaround for ESP-IDF bug
# https://github.com/esphome/esphome/issues/15783
#
# To enable, uncomment bluetooth_proxy below AND add the pre-build
# patch to esphome: platformio_options (see top of this file).
# The patch fixes a NULL pointer crash in the Bluedroid BLE stack
# that occurs during GATT service discovery when bluetooth_proxy
# registers multiple GATT client interfaces.
#
# bluetooth_proxy:
#   active: true
