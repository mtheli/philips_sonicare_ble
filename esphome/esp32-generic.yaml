esphome:
  name: esp32-ble-bridge
  friendly_name: "ESP32 BLE Bridge"
  # Optional: bluedroid_null_fix.py cherry-picks the NULL pointer guards
  # from ESP-IDF commit d4f3517 into the build. Uncomment the
  # platformio_options block below if you opt into either:
  #   - CONFIG_BT_GATTC_CACHE_NVS_FLASH (see sdkconfig_options below)
  #   - bluetooth_proxy: (see end of file)
  # Both crash on ESP-IDF 5.5's bluedroid GATT cache path without the
  # patch. Place the script next to this YAML in your ESPHome config dir.
  #
  # platformio_options:
  #   extra_scripts:
  #     - pre:/config/esphome/bluedroid_null_fix.py

# ESP-IDF is required (not Arduino) because Bluedroid's notification limit
# is only configurable via sdkconfig.  Arduino uses precompiled libbt.a with
# BTA_GATTC_NOTIF_REG_MAX=5 — Sonicare needs 11 subscriptions.
esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_MAX_CACHE_CHAR: "80"    # default 40; Sonicare has ~45 attributes
      CONFIG_BT_GATTC_NOTIF_REG_MAX: "20"     # default 5; we subscribe to 11 chars
      # Optional: persist discovered GATT DB to NVS keyed by bonded peer
      # identity. First connect still does a full ~4s SDP; subsequent
      # reconnects to the same brush hit the cache in tens of ms. Requires
      # the bluedroid_null_fix.py pre-script (uncomment platformio_options
      # at the top of this file) — without it the cache-save path crashes
      # inside bta_gattc_cache_save on ESP-IDF 5.5.
      # CONFIG_BT_GATTC_CACHE_NVS_FLASH: "y"

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  custom_services: true
  homeassistant_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP32-BLE-Bridge-Fallback"
    password: !secret fallback_password

captive_portal:

# --- BLE ---

esp32_ble:
  io_capability: none
  max_notifications: 20

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 211ms
    window: 120ms

# --- Philips Sonicare Component (Auto-Discovery — no MAC required) ---
#
# The component scans for the Sonicare service UUID, bonds with the brush
# you put into pair-mode via the HA setup flow, and stores the bond identity
# in NVS.  After bonding, the controller resolves rotating BLE addresses
# (RPA) back to the same brush automatically — no MAC pinning needed.
#
# To pair:
#   1. Flash this firmware
#   2. In Home Assistant, add the Philips Sonicare integration → ESP32 Bridge
#   3. Walk through "Pair toothbrush with bridge" — switch on the brush when
#      prompted, the ESP scans, bonds, and finishes setup.
#
# BLE bonding is handled automatically. Models that require bonding (e.g.
# Prestige 9900, ExpertClean, HX991M) are paired via SMP after service
# discovery; models with open GATT (e.g. DiamondClean) work without pairing.

external_components:
  - source:
      type: git
      url: https://github.com/mtheli/philips_sonicare_ble
      ref: master
      path: esphome/components
    components: [philips_sonicare]
    refresh: 0s                  # always fetch latest code on build

philips_sonicare:
  - id: philips_sonicare_ble
    on_connect:
      then:
        - logger.log: "Connected to Sonicare"
    on_disconnect:
      then:
        - logger.log: "Disconnected from Sonicare"

# --- Optional: Status LED ---
# Uncomment and adjust GPIO for your board if you want a status indicator.
#
# For boards with a built-in LED (e.g. GPIO2 on many DevKit boards):
# light:
#   - platform: binary
#     output: status_led_output
#     id: status_led
#     name: "Status LED"
#
# output:
#   - platform: gpio
#     id: status_led_output
#     pin: GPIO2

# --- Bluetooth Proxy (optional) ---
# Uncomment to relay BLE for other devices through this ESP. Requires the
# bluedroid_null_fix.py patch (uncomment platformio_options at the top of
# this file) to dodge ESP-IDF bug
# https://github.com/esphome/esphome/issues/15783 — without the patch,
# every GATT service discovery crashes the chip.
#
# bluetooth_proxy:
#   active: true
